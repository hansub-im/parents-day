  <path d="M128 255 C172 222 209 239 225 276 C181 287 145 278 128 255Z"
        fill="url(#leaf)"/>

  <path d="M44 254 C78 247 101 237 121 230" stroke="#1d6b37" stroke-width="2" fill="none"/>
  <path d="M213 274 C178 266 149 261 128 255" stroke="#1d6b37" stroke-width="2" fill="none"/>

  <!-- calyx -->
  <path d="M91 144 C108 129 151 129 168 144
           C153 153 145 166 133 183
           C123 166 109 153 91 144Z"
        fill="#247c3f"/>

