    <path d="M-36 -42 C-20 -25 -19 -7 -33 12" stroke="#9f1239" stroke-width="4" fill="none" stroke-linecap="round" opacity=".35"/>
    <path d="M26 -51 C11 -30 13 -10 33 7" stroke="#9f1239" stroke-width="4" fill="none" stroke-linecap="round" opacity=".35"/>
    <path d="M-6 -61 C8 -34 5 -6 -6 24" stroke="#9f1239" stroke-width="4" fill="none" stroke-linecap="round" opacity=".28"/>
    <path d="M-47 22 C-23 18 -8 27 -2 52" stroke="#9f1239" stroke-width="4" fill="none" stroke-linecap="round" opacity=".25"/>
    <path d="M43 26 C20 20 9 30 2 55" stroke="#9f1239" stroke-width="4" fill="none" stroke-linecap="round" opacity=".25"/>

