<svg viewBox="0 0 260 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="petal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8fa3"/>
      <stop offset="55%" stop-color="#f04463"/>
      <stop offset="100%" stop-color="#b91c3a"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#63c96b"/>
      <stop offset="100%" stop-color="#1f7a3f"/>
