  <g transform="translate(130 110)">
    <path d="M0 -82 C-22 -102 -48 -83 -39 -55 C-74 -70 -98 -36 -70 -10 C-106 2 -94 46 -55 42 C-71 78 -28 101 -5 67 C18 105 64 82 52 43 C91 53 112 12 78 -9 C106 -39 74 -77 42 -56 C48 -91 21 -106 0 -82Z"
