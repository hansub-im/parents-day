spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop            # 테스트마다 스키마 재생성
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

app:
  cors:
    origins: http://localhost:5173
