server:
  port: 8083                          # newproject(8082)와 충돌 안 나게
  forward-headers-strategy: framework   # nginx 리버스 프록시 뒤에서 X-Forwarded-* 인식
  tomcat:
    uri-encoding: UTF-8                 # query string UTF-8 강제
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
      force-request: true
      force-response: true              # 한글 깨짐 방지

spring:
  application:
    name: backend
  profiles:
    active: local                       # 기본값. 운영 배포 시 SPRING_PROFILES_ACTIVE=prod
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        physical_naming_strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
        # ↑ 컬럼명 snake_case 변환 끄고 자바 필드명 그대로 매핑 (단, @Column(name=...) 명시는 그대로 우선)
  servlet:
    multipart:
      enabled: true
      max-file-size: 15MB
      max-request-size: 15MB
      file-size-threshold: 1MB

app:
  admin:
    password: ${ADMIN_PASSWORD:182637}
  cors:
    origins: ${APP_CORS_ORIGINS:http://localhost:5173}
