name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # --- Frontend ---
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      # --- Backend ---
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('backend/**/*.gradle*', 'backend/**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build backend
        working-directory: backend
        run: |
          chmod +x gradlew
          ./gradlew bootJar --console=plain --no-daemon

      - name: Locate jar
        id: jar
        working-directory: backend
        run: |
          JAR=$(ls build/libs/*.jar | grep -v plain | head -n1)
          echo "path=$JAR" >> "$GITHUB_OUTPUT"

      # --- SSH ---
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      # --- Upload + redeploy ---
      - name: Clean remote /tmp
        run: |
          ssh -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            'rm -rf /tmp/dist-parents-day /tmp/parents-day.jar && mkdir -p /tmp/dist-parents-day'

      - name: Upload jar
        run: |
          scp -P ${{ secrets.SSH_PORT }} \
            "backend/${{ steps.jar.outputs.path }}" \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/parents-day.jar

      - name: Upload frontend dist
        run: |
          scp -P ${{ secrets.SSH_PORT }} -r \
            frontend/dist/. \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/dist-parents-day/

      - name: Trigger redeploy
        run: |
          ssh -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            'sudo /usr/local/bin/redeploy-parents-day.sh'

      - name: Done
        run: echo "✅ https://im-hansub.co.kr"
