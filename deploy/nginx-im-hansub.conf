# HTTP → HTTPS + www 정규화
server {
    listen 80;
    server_name im-hansub.co.kr www.im-hansub.co.kr;
    return 301 https://www.im-hansub.co.kr$request_uri;
}

# HTTPS non-www → HTTPS www (canonical)
server {
    listen 443 ssl http2;
    server_name im-hansub.co.kr;

    ssl_certificate     /etc/letsencrypt/live/im-hansub.co.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/im-hansub.co.kr/privkey.pem;

    return 301 https://www.im-hansub.co.kr$request_uri;
}

# Main www host
server {
    listen 443 ssl http2;
    server_name www.im-hansub.co.kr;

    ssl_certificate     /etc/letsencrypt/live/im-hansub.co.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/im-hansub.co.kr/privkey.pem;

    root /var/www/im-hansub;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 백엔드 프록시
    location /api/ {
        proxy_pass http://127.0.0.1:8083;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        client_max_body_size 20M;
        proxy_read_timeout 60s;
    }
}
