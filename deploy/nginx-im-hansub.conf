server {
    listen 80;
    server_name im-hansub.co.kr www.im-hansub.co.kr;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name im-hansub.co.kr www.im-hansub.co.kr;

    ssl_certificate     /etc/letsencrypt/live/im-hansub.co.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/im-hansub.co.kr/privkey.pem;

    # 정적 프론트
    root /var/www/im-hansub;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 백엔드 프록시
    location /api/ {
        proxy_pass http://127.0.0.1:8083;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 사진 업로드 (백엔드 multipart 한도 15MB와 맞춤)
        client_max_body_size 20M;
        proxy_read_timeout 60s;
    }
}
